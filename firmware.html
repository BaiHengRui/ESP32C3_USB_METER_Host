<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>固件更新</title>
  <link rel="stylesheet" href="styles.css">
  <script type="importmap">
  {
    "imports": {
      "esptool-js": "./node_modules/esptool-js/bundle.js"
    }
  }
  </script>
  <script type="module" src="firmware-renderer.js"></script>
  <style>
    .firmware-container {
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    
    .section {
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      border: 1px solid var(--border-color);
    }
    
    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--accent-blue);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-color);
    }
    
    .file-selector {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    
    .file-selector input[type="text"] {
      flex: 1;
    }
    
    .partition-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    
    .partition-table th,
    .partition-table td {
      border: 1px solid var(--border-color);
      padding: 8px;
      text-align: left;
      font-size: 13px;
    }
    
    .partition-table th {
      background: var(--bg-tertiary);
      font-weight: 600;
    }
    
    .partition-table input[type="text"] {
      width: 100%;
      box-sizing: border-box;
    }
    
    .partition-table .btn-remove {
      background: var(--danger);
      color: #fff;
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    
    .partition-table .btn-browse-fw {
      background: var(--accent-blue);
      color: #000;
      border: none;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }
    
    .partition-table .btn-browse-fw:hover {
      background: #00b8d9;
    }
    
    .partition-table td {
      vertical-align: middle;
    }
    
    .partition-table .file-selector {
      display: flex;
      gap: 5px;
    }
    
    .partition-table .file-selector input {
      flex: 1;
      min-width: 0;
    }
    
    .partition-table td {
      position: relative;
    }
    
    .partition-table .address-hint {
      margin-left: 8px;
      font-size: 11px;
      color: #888;
      white-space: nowrap;
    }
    
    .partition-table .partition-address {
      width: 90px;
    }
    
    .btn-add-row {
      margin-top: 10px;
      background: var(--accent-blue);
      color: #000;
    }
    
    .progress-container {
      margin-top: 15px;
    }
    
    .progress-bar {
      width: 100%;
      height: 24px;
      background: var(--bg-tertiary);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--border-color);
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
      width: 0%;
      transition: width 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-size: 12px;
      font-weight: 600;
    }
    
    .progress-text {
      margin-top: 5px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .control-buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    
    .control-buttons .btn {
      flex: 1;
      padding: 10px;
      font-size: 14px;
    }
    
    .log-area {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 10px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      color: var(--text-primary);
      width: 100%;
      height: 150px;
      overflow-y: auto;
      margin-top: 10px;
    }
    
    .port-select-section {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    
    .port-select-section select {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="firmware-container">
    <!-- 端口选择 -->
    <div class="section">
      <div class="section-title">端口设置</div>
      <div class="port-select-section">
        <label>端口:</label>
        <select id="portSelect">
          <option value="">选择端口...</option>
        </select>
        <button id="refreshPortsBtn" class="btn btn-secondary">刷新</button>
      </div>
    </div>

    <!-- 分区列表 -->
    <div class="section">
      <div class="section-title">烧录分区</div>
      <table class="partition-table">
        <thead>
          <tr>
            <th style="width: 30px;">#</th>
            <th>固件文件</th>
            <th>分区地址</th>
            <th style="width: 80px;">操作</th>
          </tr>
        </thead>
        <tbody id="partitionTableBody">
          <tr data-row="0">
            <td>1</td>
            <td>
              <div class="file-selector">
                <input type="text" class="firmware-file" readonly placeholder="选择固件...">
                <button class="btn-browse-fw">浏览</button>
              </div>
            </td>
            <td>
              <input type="text" class="partition-address" value="0x00000">
              <span class="address-hint">bootloader.bin</span>
            </td>
            <td><button class="btn-remove" disabled>移除</button></td>
          </tr>
          <tr data-row="1">
            <td>2</td>
            <td>
              <div class="file-selector">
                <input type="text" class="firmware-file" readonly placeholder="选择固件...">
                <button class="btn-browse-fw">浏览</button>
              </div>
            </td>
            <td>
              <input type="text" class="partition-address" value="0x8000">
              <span class="address-hint">partitions.bin</span>
            </td>
            <td><button class="btn-remove" disabled>移除</button></td>
          </tr>
          <tr data-row="2">
            <td>3</td>
            <td>
              <div class="file-selector">
                <input type="text" class="firmware-file" readonly placeholder="选择固件...">
                <button class="btn-browse-fw">浏览</button>
              </div>
            </td>
            <td>
              <input type="text" class="partition-address" value="0x10000">
              <span class="address-hint">firmware.bin</span>
            </td>
            <td><button class="btn-remove">移除</button></td>
          </tr>
        </tbody>
      </table>
      <button id="addRowBtn" class="btn btn-add-row">添加行</button>
    </div>

    <!-- 进度条 -->
    <div class="section">
      <div class="section-title">烧录进度</div>
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill">0%</div>
        </div>
        <div class="progress-text" id="progressText">准备就绪</div>
      </div>
      <div class="control-buttons">
        <button id="eraseBtn" class="btn btn-warning">擦除</button>
        <button id="startBtn" class="btn btn-success">开始烧录</button>
        <button id="stopBtn" class="btn btn-danger" disabled>停止</button>
      </div>
    </div>

    <!-- 日志输出 -->
    <div class="section">
      <div class="section-title">操作日志</div>
      <div id="logArea" class="log-area"></div>
    </div>
  </div>
</body>
</html>
