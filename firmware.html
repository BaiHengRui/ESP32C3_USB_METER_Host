<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>固件更新</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .firmware-container {
      padding: 20px;
      max-width: 1000px;
      margin: 0 auto;
    }
    
    .section {
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      border: 1px solid var(--border-color);
    }
    
    .section-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
      color: var(--text-primary);
    }
    
    .port-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .port-row select {
      flex: 1;
      padding: 8px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .port-row select:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .partition-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 10px;
    }
    
    .partition-table th,
    .partition-table td {
      padding: 8px;
      border: 1px solid var(--border-color);
      text-align: left;
    }
    
    .partition-table th {
      background: var(--bg-hover);
      font-weight: bold;
    }
    
    .file-selector {
      display: flex;
      gap: 5px;
    }
    
    .file-selector input {
      flex: 1;
      padding: 6px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    
    .partition-address {
      width: 120px;
      padding: 6px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    
    .progress-container {
      margin-top: 10px;
    }
    
    .progress-bar {
      width: 100%;
      height: 24px;
      background: var(--bg-primary);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border-color);
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4CAF50, #45a049);
      border-radius: 12px;
      transition: width 0.3s ease;
      width: 0%;
    }
    
    .progress-info {
      display: flex;
      justify-content: space-between;
      margin-top: 5px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .button-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    
    .btn-remove {
      background: var(--danger);
      color: white;
      border: none;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
    }
    
    .btn-remove:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .log-area {
      width: 100%;
      height: 200px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 8px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 12px;
      resize: vertical;
      color: var(--text-secondary);
    }
    
    .log-area:focus {
      outline: none;
    }    
  </style>
</head>
<body>
  <div class="firmware-container">
    <div class="section">
      <div class="section-title">串口设置</div>
      <div class="port-row">
        <select id="portSelect">
          <option value="">选择端口...</option>
        </select>
        <button id="refreshPortsBtn" class="btn btn-secondary">刷新</button>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">分区表</div>
      <table class="partition-table">
        <thead>
          <tr>
            <th style="width: 40px;">#</th>
            <th>固件文件</th>
            <th style="width: 150px;">地址</th>
            <th style="width: 60px;">操作</th>
          </tr>
        </thead>
        <tbody id="partitionTableBody">
          <tr data-row="0">
            <td>1</td>
            <td>
              <div class="file-selector">
                <input type="text" class="firmware-file" readonly placeholder="选择固件..." />
                <button class="btn btn-secondary btn-browse-fw">浏览</button>
              </div>
            </td>
            <td>
              <input type="text" class="partition-address" value="0x00000">
            </td>
            <td><button class="btn-remove" disabled>移除</button></td>
          </tr>
        </tbody>
      </table>
      <button id="addRowBtn" class="btn btn-secondary">+ 添加分区</button>
    </div>
    
    <div class="section">
      <div class="section-title">进度</div>
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-info">
          <span id="progressText">准备就绪</span>
          <span id="progressPercent">0%</span>
        </div>
      </div>
    </div>
    
    <div class="section">
      <div class="button-row">
        <button id="startBtn" class="btn btn-success">开始烧录</button>
        <button id="stopBtn" class="btn btn-danger" disabled>停止</button>
        <button id="eraseBtn" class="btn btn-warning">擦除 Flash</button>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">日志</div>
      <textarea id="logArea" class="log-area" readonly></textarea>
    </div>
  </div>

  <script src="firmware-renderer.js"></script>
</body>
</html>
